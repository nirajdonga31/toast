name: pr-ci-agent

on:
  pull_request:
    branches: [main]
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  send-to-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Send skill message to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CONTENT: >-
            use skill: pr-ci-agent
            pr_url=${{ github.event.pull_request.html_url }}
        run: npx tsx .github/scripts/send-discord-webhook.ts
        shell: bash
