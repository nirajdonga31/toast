name: pr-ci-agent

on:
  pull_request:
    branches: [main]
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  send-to-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Send skill message to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CONTENT: |-
            use skill: pr-ci-agent
            pr_url=${{ github.event.pull_request.html_url }}

            MUST DO:
            1) Run: /root/.openclaw/skills/pr-ci-agent/scripts/collect_pr_context.sh ${{ github.event.pull_request.base.repo.owner.login }}/${{ github.event.pull_request.base.repo.name }} ${{ github.event.pull_request.number }} --run-tests
            2) Confirm you produced a context.json path.
            3) Add edge/failure-case tests locally (NO PUSH), rerun npm test.
            4) Reply with: Summary + Tests added + Results (PASS/FAIL).

            If you cannot run that script or cannot write files, say so explicitly.
        run: npx tsx .github/scripts/send-discord-webhook.ts
        shell: bash
